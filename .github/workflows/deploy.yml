name: Deploy Web

on:
  push:
    branches:
      - main
    paths:
      - lifestyle-web/**
      - lifestyle-mobile/**
      - .github/workflows/deploy.yml
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/lifestyle-web

concurrency:
  group: deploy-web-production
  cancel-in-progress: false

jobs:
  web-tests:
    name: Web Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lifestyle-web/server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: lifestyle-web/server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --runInBand --watchman=false

  mobile-tests:
    name: Mobile Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lifestyle-mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: lifestyle-mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test:ci

  publish-image:
    name: Build and Publish Docker Image
    runs-on: ubuntu-latest
    needs: [web-tests, mobile-tests]
    environment: production
    outputs:
      image_sha: ${{ steps.image.outputs.sha }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image name
        id: vars
        run: echo "image=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set image refs
        id: image
        run: echo "sha=${{ env.REGISTRY }}/${{ steps.vars.outputs.image }}:sha-${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.vars.outputs.image }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: lifestyle-web
          file: lifestyle-web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  rollout:
    name: Auto Rollout
    runs-on: self-hosted
    needs: [web-tests, mobile-tests]
    environment: production
    steps:
      - name: Pull latest code and rebuild
        run: |
          cd /home/cracknelldrb/Desktop/Dissertation/msml-lifestyle-monitor
          git pull
          cd lifestyle-web
          docker-compose down
          docker-compose up -d --build
          docker image prune -f
