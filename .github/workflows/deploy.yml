name: Deploy Web

on:
  push:
    branches:
      - main
    paths:
      - lifestyle-web/**
      - lifestyle-mobile/**
      - .github/workflows/deploy.yml
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/lifestyle-web
  DEPLOY_ROOT: /home/cracknelldrb/Desktop/Dissertation/msml-lifestyle-monitor

concurrency:
  group: deploy-web-production
  cancel-in-progress: false

jobs:
  web-tests:
    name: Web Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lifestyle-web/server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify native dependencies are not vendored in git
        working-directory: .
        run: |
          if git ls-files 'lifestyle-web/server/node_modules/**' | grep -q .; then
            echo "Tracked files under lifestyle-web/server/node_modules would break cross-platform deploys."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: lifestyle-web/server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --runInBand --watchman=false

  mobile-tests:
    name: Mobile Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lifestyle-mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: lifestyle-mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test:ci

  publish-image:
    name: Build and Publish Docker Image
    runs-on: ubuntu-latest
    needs: [web-tests, mobile-tests]
    environment: production
    outputs:
      image_sha: ${{ steps.image.outputs.sha }}
      image_latest: ${{ steps.image.outputs.latest }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image name
        id: vars
        run: echo "image=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set image refs
        id: image
        run: |
          echo "sha=${{ env.REGISTRY }}/${{ steps.vars.outputs.image }}:sha-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "latest=${{ env.REGISTRY }}/${{ steps.vars.outputs.image }}:latest" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.vars.outputs.image }}
          tags: |
            type=raw,value=latest
            type=sha,format=long,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: lifestyle-web
          file: lifestyle-web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  rollout:
    name: Auto Rollout
    runs-on: self-hosted
    needs: [publish-image]
    environment: production
    permissions:
      contents: read
      packages: read
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync deployment checkout to the pushed commit
        run: |
          set -eux
          cd "${DEPLOY_ROOT}"
          git fetch --prune origin
          git reset --hard "${GITHUB_SHA}"
          git clean -fd

      - name: Pull and redeploy
        env:
          LIFESTYLE_WEB_IMAGE: ${{ needs.publish-image.outputs.image_sha }}
        run: |
          set -eux

          compose() {
            if docker compose version >/dev/null 2>&1; then
              docker compose "$@"
            else
              docker-compose "$@"
            fi
          }

          cd "${DEPLOY_ROOT}/lifestyle-web"
          deploy_port="${LIFESTYLE_WEB_HOST_PORT:-4000}"
          export LIFESTYLE_WEB_HOST_PORT="${deploy_port}"

          process_cmd() {
            local pid="$1"
            ps -p "${pid}" -o args= 2>/dev/null || true
          }

          process_cwd() {
            local pid="$1"
            readlink -f "/proc/${pid}/cwd" 2>/dev/null || true
          }

          process_ppid() {
            local pid="$1"
            ps -p "${pid}" -o ppid= 2>/dev/null | tr -d '[:space:]'
          }

          process_service_unit() {
            local pid="$1"

            [ -r "/proc/${pid}/cgroup" ] || return 0
            awk -F/ '/\.service$/ { print $NF; exit }' "/proc/${pid}/cgroup"
          }

          is_lifestyle_web_host_process() {
            local pid="$1"
            local cwd

            cwd="$(process_cwd "${pid}")"
            case "${cwd}" in
              "${DEPLOY_ROOT}/lifestyle-web/server"|\
              "${DEPLOY_ROOT}/lifestyle-web/server/"*)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          is_lifestyle_web_host_root_candidate() {
            local pid="$1"
            local cmd

            if ! is_lifestyle_web_host_process "${pid}"; then
              return 1
            fi

            cmd="$(process_cmd "${pid}")"
            case "${cmd}" in
              *"src/server.js"*|\
              *nodemon*|\
              *"npm start"*|\
              *"npm run "*|\
              *"pnpm "*|\
              *"yarn "*|\
              *"node "*|\
              *"nodejs "*|\
              *"sh -c "*|\
              *"bash -c "*|\
              *"bash -lc "*)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          find_lifestyle_web_process_root() {
            local pid="$1"
            local current="$1"
            local parent_pid

            while :; do
              parent_pid="$(process_ppid "${current}")"
              [ -n "${parent_pid}" ] || break
              [ "${parent_pid}" -gt 1 ] 2>/dev/null || break

              if ! is_lifestyle_web_host_root_candidate "${parent_pid}"; then
                break
              fi

              current="${parent_pid}"
            done

            printf '%s\n' "${current}"
          }

          kill_process_tree() {
            local pid="$1"
            local signal="$2"
            local child_pid

            for child_pid in $(ps -o pid= --ppid "${pid}" 2>/dev/null || true); do
              child_pid="$(printf '%s' "${child_pid}" | tr -d '[:space:]')"
              [ -n "${child_pid}" ] || continue
              kill_process_tree "${child_pid}" "${signal}"
            done

            kill -"${signal}" "${pid}" 2>/dev/null || true
          }

          stop_conflicting_host_listener() {
            local port="$1"
            local signal="${2:-TERM}"
            local listener_pids pid root_pid cmd cwd service_unit

            if ! command -v lsof >/dev/null 2>&1; then
              echo "lsof is required on the self-hosted deploy runner."
              return 1
            fi

            listener_pids="$(lsof -tiTCP:${port} -sTCP:LISTEN 2>/dev/null || true)"
            [ -n "${listener_pids}" ] || return 0

            for pid in ${listener_pids}; do
              cmd="$(process_cmd "${pid}")"
              cwd="$(process_cwd "${pid}")"
              echo "tcp:${port} already in use by pid ${pid}: ${cmd} (cwd: ${cwd})"

              if ! is_lifestyle_web_host_process "${pid}"; then
                echo "Refusing to stop unrelated process on tcp:${port}."
                return 1
              fi

              service_unit="$(process_service_unit "${pid}")"
              if [ -n "${service_unit}" ]; then
                echo "Stopping systemd unit ${service_unit} for stale lifestyle-web host process ${pid}."
                systemctl stop "${service_unit}" 2>/dev/null \
                  || systemctl --user stop "${service_unit}" 2>/dev/null \
                  || true
              fi

              root_pid="$(find_lifestyle_web_process_root "${pid}")"
              if [ "${root_pid}" = "${pid}" ]; then
                echo "Stopping stale lifestyle-web host process tree rooted at ${pid} with SIG${signal}."
              else
                echo "Stopping stale lifestyle-web host process tree rooted at ${root_pid} with SIG${signal}."
              fi
              kill_process_tree "${root_pid}" "${signal}"
            done
          }

          stop_conflicting_docker_publisher() {
            local port="$1"
            local publishers id name compose_dir compose_service

            publishers="$(docker ps --filter "publish=${port}" --format '{{.ID}}|{{.Names}}' 2>/dev/null || true)"
            [ -n "${publishers}" ] || return 0

            while IFS='|' read -r id name; do
              [ -n "${id}" ] || continue
              compose_dir="$(docker inspect --format '{{ index .Config.Labels "com.docker.compose.project.working_dir" }}' "${id}" 2>/dev/null || true)"
              compose_service="$(docker inspect --format '{{ index .Config.Labels "com.docker.compose.service" }}' "${id}" 2>/dev/null || true)"
              echo "tcp:${port} is published by container ${name} (${id}) service=${compose_service} dir=${compose_dir}"

              case "${compose_service}:${compose_dir}" in
                "lifestyle-web:${DEPLOY_ROOT}/lifestyle-web")
                  echo "Removing stale lifestyle-web container ${name}."
                  docker rm -f "${id}"
                  ;;
                *)
                  echo "Refusing to stop unrelated container publishing tcp:${port}."
                  return 1
                  ;;
              esac
            done <<EOF
          ${publishers}
          EOF
          }

          wait_for_port_release() {
            local port="$1"
            local attempt listener_pids publisher_ids

            for attempt in $(seq 1 15); do
              listener_pids="$(lsof -tiTCP:${port} -sTCP:LISTEN 2>/dev/null || true)"
              publisher_ids="$(docker ps --filter "publish=${port}" --format '{{.ID}}' 2>/dev/null || true)"

              if [ -z "${listener_pids}" ] && [ -z "${publisher_ids}" ]; then
                return 0
              fi

              if [ -n "${listener_pids}" ]; then
                echo "Attempt ${attempt}: tcp:${port} still has host listeners: ${listener_pids}"
                if [ "${attempt}" -ge 10 ]; then
                  stop_conflicting_host_listener "${port}" KILL
                else
                  stop_conflicting_host_listener "${port}" TERM
                fi
              fi

              if [ -n "${publisher_ids}" ]; then
                echo "Attempt ${attempt}: tcp:${port} is still published by containers: ${publisher_ids}"
                stop_conflicting_docker_publisher "${port}"
                compose rm -fs lifestyle-web || true
              fi

              sleep 1
            done

            echo "tcp:${port} is still occupied after waiting for release."
            [ -n "${listener_pids}" ] && echo "Remaining host listeners: ${listener_pids}"
            [ -n "${publisher_ids}" ] && echo "Remaining docker publishers: ${publisher_ids}"
            return 1
          }

          pulled_image=false
          if docker pull "${LIFESTYLE_WEB_IMAGE}"; then
            pulled_image=true
          else
            echo "Falling back to a local build for ${LIFESTYLE_WEB_IMAGE} from ${GITHUB_SHA}."
            compose build lifestyle-web
          fi

          if [ "${pulled_image}" = true ]; then
            echo "Using published image ${LIFESTYLE_WEB_IMAGE}."
          else
            echo "Using locally built image for ${LIFESTYLE_WEB_IMAGE}."
          fi

          stop_conflicting_host_listener "${deploy_port}"
          stop_conflicting_docker_publisher "${deploy_port}"
          compose rm -fs lifestyle-web || true
          wait_for_port_release "${deploy_port}"
          compose up -d --remove-orphans portainer
          compose up -d --remove-orphans lifestyle-web

          for attempt in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:${deploy_port}/api/health" >/dev/null; then
              docker image prune -f
              exit 0
            fi
            sleep 2
          done

          compose ps
          compose logs --tail=200 lifestyle-web
          exit 1
