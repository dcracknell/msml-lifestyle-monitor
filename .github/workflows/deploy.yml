name: Deploy Web

on:
  push:
    branches:
      - main
    paths:
      - lifestyle-web/**
      - lifestyle-mobile/**
      - .github/workflows/deploy.yml
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/lifestyle-web
  DEPLOY_ROOT: /home/cracknelldrb/Desktop/Dissertation/msml-lifestyle-monitor

concurrency:
  group: deploy-web-production
  cancel-in-progress: false

jobs:
  web-tests:
    name: Web Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lifestyle-web/server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify native dependencies are not vendored in git
        working-directory: .
        run: |
          if git ls-files 'lifestyle-web/server/node_modules/**' | grep -q .; then
            echo "Tracked files under lifestyle-web/server/node_modules would break cross-platform deploys."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: lifestyle-web/server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --runInBand --watchman=false

  mobile-tests:
    name: Mobile Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lifestyle-mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: lifestyle-mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test:ci

  publish-image:
    name: Build and Publish Docker Image
    runs-on: ubuntu-latest
    needs: [web-tests, mobile-tests]
    environment: production
    outputs:
      image_sha: ${{ steps.image.outputs.sha }}
      image_latest: ${{ steps.image.outputs.latest }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image name
        id: vars
        run: echo "image=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set image refs
        id: image
        run: |
          echo "sha=${{ env.REGISTRY }}/${{ steps.vars.outputs.image }}:sha-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "latest=${{ env.REGISTRY }}/${{ steps.vars.outputs.image }}:latest" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.vars.outputs.image }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: lifestyle-web
          file: lifestyle-web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  rollout:
    name: Auto Rollout
    runs-on: self-hosted
    needs: [publish-image]
    environment: production
    permissions:
      contents: read
      packages: read
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync deployment checkout to the pushed commit
        run: |
          set -eux
          cd "${DEPLOY_ROOT}"
          git fetch --prune origin
          git reset --hard "${GITHUB_SHA}"
          git clean -fd

      - name: Pull and redeploy
        env:
          LIFESTYLE_WEB_IMAGE: ${{ needs.publish-image.outputs.image_sha }}
        run: |
          set -eux

          compose() {
            if docker compose version >/dev/null 2>&1; then
              docker compose "$@"
            else
              docker-compose "$@"
            fi
          }

          cd "${DEPLOY_ROOT}/lifestyle-web"
          deploy_port="${LIFESTYLE_WEB_HOST_PORT:-4000}"
          export LIFESTYLE_WEB_HOST_PORT="${deploy_port}"

          stop_conflicting_host_listener() {
            local port="$1"
            local listener_pids cmd cwd remaining_pids

            if ! command -v lsof >/dev/null 2>&1; then
              echo "lsof is required on the self-hosted deploy runner."
              return 1
            fi

            listener_pids="$(lsof -tiTCP:${port} -sTCP:LISTEN 2>/dev/null || true)"
            [ -n "${listener_pids}" ] || return 0

            for pid in ${listener_pids}; do
              cmd="$(ps -p "${pid}" -o args= 2>/dev/null || true)"
              cwd="$(readlink -f "/proc/${pid}/cwd" 2>/dev/null || true)"
              echo "tcp:${port} already in use by pid ${pid}: ${cmd} (cwd: ${cwd})"

              case "${cwd}" in
                "${DEPLOY_ROOT}/lifestyle-web/server"|\
                "${DEPLOY_ROOT}/lifestyle-web/server/"*)
                  echo "Stopping stale lifestyle-web host process ${pid}."
                  kill "${pid}"
                  ;;
                *)
                  echo "Refusing to stop unrelated process on tcp:${port}."
                  return 1
                  ;;
              esac
            done

            sleep 2
            remaining_pids="$(lsof -tiTCP:${port} -sTCP:LISTEN 2>/dev/null || true)"
            if [ -n "${remaining_pids}" ]; then
              echo "tcp:${port} is still occupied after cleanup: ${remaining_pids}"
              return 1
            fi
          }

          pulled_image=false
          if docker pull "${LIFESTYLE_WEB_IMAGE}"; then
            pulled_image=true
          else
            echo "Falling back to a local build for ${LIFESTYLE_WEB_IMAGE} from ${GITHUB_SHA}."
            compose build lifestyle-web
          fi

          if [ "${pulled_image}" = true ]; then
            echo "Using published image ${LIFESTYLE_WEB_IMAGE}."
          else
            echo "Using locally built image for ${LIFESTYLE_WEB_IMAGE}."
          fi

          stop_conflicting_host_listener "${deploy_port}"
          compose up -d --remove-orphans portainer
          compose up -d --remove-orphans --force-recreate lifestyle-web

          for attempt in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:${deploy_port}/api/health" >/dev/null; then
              docker image prune -f
              exit 0
            fi
            sleep 2
          done

          compose ps
          compose logs --tail=200 lifestyle-web
          exit 1
