apiVersion: apps/v1
kind: Deployment
metadata:
  name: lifestyle-web
  labels:
    app.kubernetes.io/name: lifestyle-web
    app.kubernetes.io/part-of: msml-lifestyle-monitor
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: lifestyle-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lifestyle-web
        app.kubernetes.io/part-of: msml-lifestyle-monitor
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        fsGroup: 1000
      containers:
        - name: lifestyle-web
          image: ghcr.io/change-me/msml-lifestyle-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4000
          env:
            - name: NODE_ENV
              value: production
          envFrom:
            - configMapRef:
                name: lifestyle-web-config
            - secretRef:
                name: lifestyle-web-secrets
          volumeMounts:
            - name: database-storage
              mountPath: /app/lifestyle-web/database/storage
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: database-storage
          persistentVolumeClaim:
            claimName: lifestyle-web-db
