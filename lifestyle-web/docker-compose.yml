services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data

  lifestyle-web:
    image: ${LIFESTYLE_WEB_IMAGE:-lifestyle-web:local}
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    env_file:
      - server/.env
    ports:
      - "${LIFESTYLE_WEB_HOST_PORT:-4000}:4000"
    volumes:
      - lifestyle-web-db:/app/lifestyle-web/database/storage
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/api/health').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 5
    restart: unless-stopped

volumes:
  lifestyle-web-db:
  portainer-data:
