# nginx reverse proxy for msmls.org → Node server on port 4000
# Place this file at: /etc/nginx/sites-available/msmls
# Then: sudo ln -s /etc/nginx/sites-available/msmls /etc/nginx/sites-enabled/msmls
# Then: sudo nginx -t && sudo systemctl reload nginx

# Redirect plain HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name msmls.org www.msmls.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://www.msmls.org$request_uri;
    }
}

# HTTPS — proxies to Node on localhost:4000
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name msmls.org www.msmls.org;

    # SSL certificates from Let's Encrypt (certbot fills these in)
    ssl_certificate     /etc/letsencrypt/live/msmls.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/msmls.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Allow large payloads (meal photos sent as base64 can be ~10 MB)
    client_max_body_size 25m;

    # Long timeouts for NUT photo analysis (can take up to 55 s)
    proxy_read_timeout  120s;
    proxy_send_timeout  120s;
    proxy_connect_timeout 10s;

    location / {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
